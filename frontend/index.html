<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudDash Support — AI Assistant</title>
  <meta name="description" content="CloudDash multi-agent AI customer support — ask about billing, technical issues, or your account." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#1e1b4b',
            },
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulse3: {
              '0%, 80%, 100%': { transform: 'scale(0)', opacity: '0.5' },
              '40%':            { transform: 'scale(1.0)', opacity: '1' },
            },
          },
          animation: {
            fadeUp:  'fadeUp 0.25s ease-out forwards',
            pulse3:  'pulse3 1.4s ease-in-out infinite',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* Scrollbar styling */
    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: #4338ca44; border-radius: 99px; }

    /* Typing dots animation delays */
    .dot-1 { animation-delay: 0s; }
    .dot-2 { animation-delay: 0.2s; }
    .dot-3 { animation-delay: 0.4s; }

    /* Markdown-like code formatting inside messages */
    .msg-content code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(99,102,241,0.12);
      color: #818cf8;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.82em;
    }
    .msg-content pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin-top: 6px;
    }
    .msg-content pre code { background: none; color: #a5b4fc; padding: 0; font-size: 0.85em; }
    .msg-content strong { color: #e0e7ff; }
    .msg-content ul  { list-style: disc;    padding-left: 1.25em; margin-top: 4px; }
    .msg-content ol  { list-style: decimal; padding-left: 1.25em; margin-top: 4px; }
    .msg-content li  { margin-bottom: 2px; }

    /* Gradient border on user input */
    #msg-input:focus { outline: none; }
    .input-ring:focus-within { box-shadow: 0 0 0 2px #6366f1; }

    /* Agent badge colours */
    .badge-triage    { background: #1e1b4b; color: #818cf8; }
    .badge-technical { background: #0f172a; color: #38bdf8; }
    .badge-billing   { background: #0a1628; color: #34d399; }
    .badge-escalation{ background: #1c0a00; color: #fb923c; }
    .badge-guardrail { background: #1a0000; color: #f87171; }
    .badge-system    { background: #111827; color: #9ca3af; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="flex-none flex items-center gap-3 px-5 py-3.5 border-b border-white/5 bg-gray-900/70 backdrop-blur-md">
    <!-- Logo mark -->
    <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center flex-none shadow-lg shadow-brand-600/40">
      <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <div class="flex-1 min-w-0">
      <h1 class="text-sm font-semibold text-white leading-tight">CloudDash Support</h1>
      <p class="text-xs text-gray-400 leading-tight truncate">Multi-Agent AI Assistant</p>
    </div>
    <!-- Status pill -->
    <div id="status-pill"
         class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 transition-all duration-300">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
      <span id="status-text">Online</span>
    </div>
    <!-- New session button -->
    <button id="new-session-btn"
            title="Start a new conversation"
            class="ml-1 p-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
    </button>
  </header>

  <!-- ═══════════════════════════════ SESSION INFO ══════════════════════════ -->
  <div class="flex-none flex items-center gap-2 px-5 py-2 bg-gray-900/40 border-b border-white/5">
    <span class="text-xs text-gray-500">Session:</span>
    <code id="session-label" class="text-xs font-mono text-brand-400 truncate max-w-xs"></code>
    <button id="copy-session-btn"
            title="Copy session ID"
            class="ml-auto p-1 text-gray-600 hover:text-gray-300 transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
      </svg>
    </button>
  </div>

  <!-- ═══════════════════════════════ CHAT WINDOW ═══════════════════════════ -->
  <main id="chat-window"
        class="flex-1 overflow-y-auto px-4 py-6 space-y-5 scroll-smooth">

    <!-- Welcome message (shown before first message) -->
    <div id="welcome-card"
         class="max-w-xl mx-auto text-center py-12 animate-fadeUp">
      <div class="w-16 h-16 mx-auto mb-5 rounded-2xl bg-brand-600/20 border border-brand-600/30 flex items-center justify-center">
        <svg class="w-8 h-8 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
        </svg>
      </div>
      <h2 class="text-xl font-semibold text-white mb-2">How can we help you today?</h2>
      <p class="text-sm text-gray-400 mb-7 max-w-sm mx-auto">
        I'm your CloudDash AI assistant. Ask me about technical issues, billing, account settings, or anything else.
      </p>
      <!-- Suggestion chips -->
      <div class="flex flex-wrap justify-center gap-2" id="suggestions">
        <button class="suggestion-chip px-3.5 py-1.5 rounded-full text-xs font-medium bg-white/5 border border-white/10 text-gray-300 hover:bg-brand-600/20 hover:border-brand-500/40 hover:text-white transition-all">
          I'm getting ERR-4012 on AWS
        </button>
        <button class="suggestion-chip px-3.5 py-1.5 rounded-full text-xs font-medium bg-white/5 border border-white/10 text-gray-300 hover:bg-brand-600/20 hover:border-brand-500/40 hover:text-white transition-all">
          What plan am I on?
        </button>
        <button class="suggestion-chip px-3.5 py-1.5 rounded-full text-xs font-medium bg-white/5 border border-white/10 text-gray-300 hover:bg-brand-600/20 hover:border-brand-500/40 hover:text-white transition-all">
          How do I set up alerting?
        </button>
        <button class="suggestion-chip px-3.5 py-1.5 rounded-full text-xs font-medium bg-white/5 border border-white/10 text-gray-300 hover:bg-brand-600/20 hover:border-brand-500/40 hover:text-white transition-all">
          I need to upgrade to Scale
        </button>
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════ INPUT BAR ═════════════════════════════ -->
  <footer class="flex-none px-4 pb-5 pt-3 bg-gray-950/80 backdrop-blur-md border-t border-white/5">
    <form id="chat-form"
          class="max-w-3xl mx-auto flex items-end gap-2">
      <div class="input-ring flex-1 flex items-end gap-2 bg-gray-800/80 border border-white/10 rounded-2xl px-4 py-3 transition-all">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Message CloudDash Support…"
          class="flex-1 bg-transparent resize-none text-sm text-gray-100 placeholder-gray-500 leading-relaxed max-h-40 overflow-y-auto"
          style="field-sizing: content;"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
      </div>
      <button
        type="submit"
        id="send-btn"
        class="flex-none w-10 h-10 mb-0.5 rounded-xl bg-brand-600 hover:bg-brand-500 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100 transition-all flex items-center justify-center shadow-lg shadow-brand-600/30"
      >
        <!-- Send icon (shown normally) -->
        <svg id="send-icon" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
        </svg>
        <!-- Spinner (shown while loading) -->
        <svg id="send-spinner" class="w-4 h-4 text-white animate-spin hidden" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      </button>
    </form>
    <p class="text-center text-xs text-gray-600 mt-2">
      AI responses may not be 100% accurate. For urgent issues email
      <a href="mailto:support@clouddash.io" class="text-brand-400 hover:underline">support@clouddash.io</a>
    </p>
  </footer>


  <!-- ═══════════════════════════════ JAVASCRIPT ════════════════════════════ -->
  <script>
    // -----------------------------------------------------------------------
    // Configuration
    // -----------------------------------------------------------------------
    const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null' || !window.location.origin)
      ? 'http://127.0.0.1:8000'
      : window.location.origin;

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let sessionId = localStorage.getItem('clouddash_session_id') || crypto.randomUUID();
    let isLoading = false;
    let isEscalated = false;  // true once session is locked to human operator
    let turnCount  = 0;

    // Persist session ID so page refresh continues the same conversation
    localStorage.setItem('clouddash_session_id', sessionId);

    // Display session ID in header
    document.getElementById('session-label').textContent = sessionId;

    // -----------------------------------------------------------------------
    // Agent metadata — badge colour & display name per agent type
    // -----------------------------------------------------------------------
    const AGENT_META = {
      triage_agent:            { label: 'Triage',           css: 'badge-triage' },
      technical_support_agent: { label: 'Technical Support', css: 'badge-technical' },
      billing_agent:           { label: 'Billing',          css: 'badge-billing' },
      escalation_agent:        { label: 'Escalation',       css: 'badge-escalation' },
      human_handoff:           { label: '🧑 Human Support', css: 'badge-escalation' },
      guardrail:               { label: 'Safety Filter',    css: 'badge-guardrail' },
      guardrail_escalation:    { label: 'Safety Filter',    css: 'badge-guardrail' },
      assistant:               { label: 'Assistant',        css: 'badge-system' },
      system:                  { label: 'System',           css: 'badge-system' },
    };

    // -----------------------------------------------------------------------
    // Minimal Markdown renderer (bold, code, backticks, lists)
    // -----------------------------------------------------------------------
    function renderMarkdown(text) {
      return text
        // Escape HTML first
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        // Fenced code blocks
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${code.trimEnd()}</code></pre>`)
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/_(.+?)_/g, '<em>$1</em>')
        // Numbered list items (simple)
        .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
        // Bullet list items
        .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
        // Wrap consecutive <li> in <ol> or <ul>
        .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
        // Line breaks
        .replace(/\n/g, '<br/>');
    }

    // -----------------------------------------------------------------------
    // DOM helpers
    // -----------------------------------------------------------------------
    const chatWindow   = document.getElementById('chat-window');
    const welcomeCard  = document.getElementById('welcome-card');
    const chatForm     = document.getElementById('chat-form');
    const msgInput     = document.getElementById('msg-input');
    const sendBtn      = document.getElementById('send-btn');
    const sendIcon     = document.getElementById('send-icon');
    const sendSpinner  = document.getElementById('send-spinner');
    const statusPill   = document.getElementById('status-pill');
    const statusText   = document.getElementById('status-text');

    function scrollToBottom(smooth = true) {
      chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
    }

    function setLoading(loading) {
      isLoading = loading;
      // Keep UI locked if escalated — don't re-enable input for agents
      if (!isEscalated) {
        sendBtn.disabled = loading;
        msgInput.disabled = loading;
      }
      sendIcon.classList.toggle('hidden', loading);
      sendSpinner.classList.toggle('hidden', !loading);
    }

    function enterHumanMode() {
      if (isEscalated) return; // already locked
      isEscalated = true;
      // Lock the input area
      msgInput.disabled = true;
      msgInput.placeholder = 'Chat locked — awaiting human support agent…';
      sendBtn.disabled = true;
      // Update status indicator
      setStatus('Human Support', 'amber');
      // Show a persistent banner above the input
      const banner = document.createElement('div');
      banner.id = 'human-mode-banner';
      banner.className = 'flex items-center gap-2 px-4 py-3 bg-orange-500/10 border-t border-orange-500/20 text-orange-300 text-sm';
      banner.innerHTML = `
        <svg class="w-4 h-4 flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span><strong>Transferred to Human Support.</strong> A support agent will reach out via your registered email. This chat is now read-only.</span>`;
      const form = document.getElementById('chat-form');
      form.parentNode.insertBefore(banner, form);
    }

    function setStatus(text, colour = 'emerald') {
      const colours = {
        emerald: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
        amber:   'bg-amber-500/10   text-amber-400   border-amber-500/20',
        red:     'bg-red-500/10     text-red-400     border-red-500/20',
      };
      statusPill.className =
        `flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border transition-all duration-300 ${colours[colour] || colours.emerald}`;
      statusText.textContent = text;
    }

    // -----------------------------------------------------------------------
    // Append a user message bubble
    // -----------------------------------------------------------------------
    function appendUserMessage(text) {
      if (turnCount === 0) welcomeCard.classList.add('hidden');
      turnCount++;

      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-end animate-fadeUp';
      wrapper.innerHTML = `
        <div class="max-w-[75%] lg:max-w-[60%]">
          <div class="bg-brand-600 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm leading-relaxed shadow-lg shadow-brand-600/20">
            ${renderMarkdown(text)}
          </div>
          <p class="text-xs text-gray-600 mt-1 text-right pr-1">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
        </div>`;
      chatWindow.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    // -----------------------------------------------------------------------
    // Show the typing indicator while waiting
    // -----------------------------------------------------------------------
    function appendTypingIndicator() {
      const el = document.createElement('div');
      el.id = 'typing-indicator';
      el.className = 'flex items-end gap-3 animate-fadeUp';
      el.innerHTML = `
        <div class="w-8 h-8 rounded-full bg-brand-600/20 border border-brand-600/30 flex items-center justify-center flex-none">
          <svg class="w-4 h-4 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div class="bg-gray-800/80 border border-white/5 px-4 py-3.5 rounded-2xl rounded-tl-sm flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-brand-400 inline-block animate-pulse3 dot-1"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-brand-400 inline-block animate-pulse3 dot-2"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-brand-400 inline-block animate-pulse3 dot-3"></span>
        </div>`;
      chatWindow.appendChild(el);
      scrollToBottom();
      return el;
    }

    // -----------------------------------------------------------------------
    // Append an AI response bubble with metadata ribbon
    // -----------------------------------------------------------------------
    function appendAssistantMessage(data) {
      document.getElementById('typing-indicator')?.remove();

      const meta  = AGENT_META[data.agent] || AGENT_META['assistant'];
      const time  = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      // Build metadata pills
      const pills = [];
      if (data.intent)      pills.push(`<span class="px-2 py-0.5 rounded-full bg-white/5 text-gray-400 text-xs">intent: ${data.intent}</span>`);
      if (data.confidence != null) pills.push(`<span class="px-2 py-0.5 rounded-full bg-white/5 text-gray-400 text-xs">conf: ${(data.confidence*100).toFixed(0)}%</span>`);
      if (data.is_escalated) pills.push(`<span class="px-2 py-0.5 rounded-full bg-orange-500/15 text-orange-400 text-xs">Escalated</span>`);
      if (data.guardrail_triggered) pills.push(`<span class="px-2 py-0.5 rounded-full bg-red-500/15 text-red-400 text-xs">Guardrail</span>`);
      if (data.handover_count > 0) pills.push(`<span class="px-2 py-0.5 rounded-full bg-white/5 text-gray-400 text-xs">${data.handover_count} handover${data.handover_count>1?'s':''}</span>`);

      const wrapper = document.createElement('div');
      wrapper.className = 'flex items-start gap-3 animate-fadeUp';
      wrapper.innerHTML = `
        <!-- Avatar -->
        <div class="w-8 h-8 rounded-full bg-brand-600/20 border border-brand-600/30 flex items-center justify-center flex-none mt-0.5">
          <svg class="w-4 h-4 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <!-- Bubble -->
        <div class="flex-1 max-w-[80%] lg:max-w-[65%] min-w-0">
          <!-- Agent badge + timestamp -->
          <div class="flex items-center gap-2 mb-1.5">
            <span class="px-2 py-0.5 rounded-md text-xs font-semibold tracking-wide ${meta.css}">${meta.label}</span>
            <span class="text-xs text-gray-600">${time}</span>
          </div>
          <!-- Message body -->
          <div class="msg-content bg-gray-800/70 border border-white/5 text-sm text-gray-200 px-4 py-3.5 rounded-2xl rounded-tl-sm leading-relaxed shadow-sm">
            ${renderMarkdown(data.response)}
          </div>
          <!-- Metadata ribbon -->
          ${pills.length ? `<div class="flex flex-wrap gap-1.5 mt-2">${pills.join('')}</div>` : ''}
        </div>`;
      chatWindow.appendChild(wrapper);
      scrollToBottom();

      // Lock the UI if this response triggered escalation
      if (data.is_escalated) {
        enterHumanMode();
      }
    }

    // -----------------------------------------------------------------------
    // Append an inline error notice
    // -----------------------------------------------------------------------
    function appendErrorMessage(message) {
      document.getElementById('typing-indicator')?.remove();
      const el = document.createElement('div');
      el.className = 'flex justify-center animate-fadeUp';
      el.innerHTML = `
        <div class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm max-w-lg">
          <svg class="w-4 h-4 flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          ${message}
        </div>`;
      chatWindow.appendChild(el);
      scrollToBottom();
    }

    // -----------------------------------------------------------------------
    // Core: send message to API
    // -----------------------------------------------------------------------
    async function sendMessage(text) {
      if (!text.trim() || isLoading || isEscalated) return;

      appendUserMessage(text);
      const typingEl = appendTypingIndicator();
      setLoading(true);
      setStatus('Thinking…', 'amber');

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message:    text.trim(),
            session_id: sessionId,
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();

        // Update session ID in case API changed it (shouldn't happen, but safe)
        if (data.session_id && data.session_id !== sessionId) {
          sessionId = data.session_id;
          localStorage.setItem('clouddash_session_id', sessionId);
          document.getElementById('session-label').textContent = sessionId;
        }

        appendAssistantMessage(data);
        setStatus('Online', 'emerald');

      } catch (err) {
        typingEl?.remove();
        console.error('Chat error:', err);

        if (err.message === 'Failed to fetch') {
          appendErrorMessage('Cannot reach the server. Make sure uvicorn is running on port 8000.');
          setStatus('Offline', 'red');
        } else {
          appendErrorMessage(`Error: ${err.message}`);
          setStatus('Error', 'red');
        }
      } finally {
        setLoading(false);
      }
    }

    // -----------------------------------------------------------------------
    // Form submit
    // -----------------------------------------------------------------------
    chatForm.addEventListener('submit', e => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = '';
      msgInput.style.height = 'auto';
      sendMessage(text);
    });

    // Shift+Enter = new line; Enter alone = submit
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event('submit'));
      }
    });

    // Auto-grow textarea
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
    });

    // -----------------------------------------------------------------------
    // Suggestion chips
    // -----------------------------------------------------------------------
    document.querySelectorAll('.suggestion-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        msgInput.value = btn.textContent.trim();
        chatForm.dispatchEvent(new Event('submit'));
      });
    });

    // -----------------------------------------------------------------------
    // Copy session ID
    // -----------------------------------------------------------------------
    document.getElementById('copy-session-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(sessionId).then(() => {
        const btn = document.getElementById('copy-session-btn');
        btn.innerHTML = `<svg class="w-3.5 h-3.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        setTimeout(() => {
          btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>`;
        }, 1500);
      });
    });

    // -----------------------------------------------------------------------
    // New session button
    // -----------------------------------------------------------------------
    document.getElementById('new-session-btn').addEventListener('click', () => {
      if (!confirm('Start a new conversation? Your current history will be preserved under the current session ID.')) return;
      sessionId = crypto.randomUUID();
      localStorage.setItem('clouddash_session_id', sessionId);
      document.getElementById('session-label').textContent = sessionId;

      // Clear the chat window (keep the welcome card)
      chatWindow.innerHTML = '';
      chatWindow.appendChild(welcomeCard);
      welcomeCard.classList.remove('hidden');
      turnCount = 0;

      // Reset human-mode state
      isEscalated = false;
      msgInput.disabled = false;
      msgInput.placeholder = 'Message CloudDash Support…';
      sendBtn.disabled = false;
      document.getElementById('human-mode-banner')?.remove();

      setStatus('Online', 'emerald');
    });

    // -----------------------------------------------------------------------
    // Load conversation history on page load (for returning users)
    // -----------------------------------------------------------------------
    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/history?session_id=${encodeURIComponent(sessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        if (!data.messages || data.messages.length === 0) return;

        welcomeCard.classList.add('hidden');
        data.messages.forEach(msg => {
          if (msg.role === 'user') {
            appendUserMessage(msg.content);
          } else if (!msg.content.startsWith('[TRIAGE]')) {
            // Reconstruct as an assistant bubble with minimal metadata
            appendAssistantMessage({
              response: msg.content,
              agent: msg.role,
              intent: null,
              confidence: null,
              is_escalated: false,   // suppress per-bubble lock during replay
              guardrail_triggered: false,
              handover_count: 0,
            });
          }
        });
        // Restore human-mode lock if the session was previously escalated
        if (data.is_escalated) {
          enterHumanMode();
        }
        scrollToBottom(false);
      } catch {
        // History not available — start fresh; no error shown
      }
    }

    // Start loading history after a brief delay (lets page paint first)
    setTimeout(loadHistory, 300);

    // -----------------------------------------------------------------------
    // Focus input on load
    // -----------------------------------------------------------------------
    msgInput.focus();
  </script>
</body>
</html>
